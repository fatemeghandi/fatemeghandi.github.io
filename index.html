<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bloo</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

  body {
    background: radial-gradient(ellipse at 50% 80%, #0d1b3e 0%, #060d1f 60%, #000 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }

  /* Stars background */
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute; width: 2px; height: 2px;
    background: white; border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.9; } }

  /* Floor / shelf */
  .shelf {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 38%;
    background: linear-gradient(to bottom, #1a2a1a 0%, #0d1a0d 100%);
    border-top: 3px solid #2a4a2a;
    z-index: 1;
  }
  .shelf::before {
    content: '';
    position: absolute; top: -1px; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, #4a8a4a, transparent);
    box-shadow: 0 0 20px #2a6a2a;
  }

  /* Ground glow */
  .ground-glow {
    position: fixed; bottom: 34%; left: 50%;
    transform: translateX(-50%);
    width: 260px; height: 40px;
    background: radial-gradient(ellipse, rgba(80,140,255,0.25) 0%, transparent 70%);
    z-index: 2; pointer-events: none;
  }

  /* Scene container */
  .scene {
    position: fixed;
    bottom: 33%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 220px;
    height: 300px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  /* Speech bubble */
  .bubble {
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%) scale(0);
    background: white;
    color: #1a1a2e;
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 20;
    pointer-events: none;
  }
  .bubble.show { transform: translateX(-50%) scale(1); }
  .bubble::after {
    content: '';
    position: absolute; bottom: -8px; left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: white;
    border-bottom: none;
  }

  /* ===== BLOO CHARACTER ===== */
  .bloo-wrap {
    position: relative;
    width: 160px;
    height: 200px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s;
  }

  /* 3D container */
  .bloo-3d {
    position: relative;
    width: 140px;
    height: 185px;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1);
  }

  /* Body */
  .body {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 145px;
    background: radial-gradient(ellipse at 35% 30%, #7ab0ff 0%, #4a7de8 35%, #2a5cc8 65%, #1a3a8a 100%);
    border-radius: 60px 60px 45px 45px;
    box-shadow:
      inset -12px -8px 20px rgba(0,0,40,0.5),
      inset 8px 10px 18px rgba(180,210,255,0.35),
      0 0 0 2.5px #1a3070,
      0 8px 30px rgba(40,80,200,0.4),
      6px 0 0 2px #1a3070,
      -6px 0 0 2px #1a3070;
    animation: bodyBob 3s ease-in-out infinite;
    transition: all 0.3s;
  }
  /* Body highlight */
  .body::before {
    content: '';
    position: absolute;
    top: 12px; left: 18px;
    width: 30px; height: 18px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 80%);
    border-radius: 50%;
    transform: rotate(-20deg);
  }
  /* Body side shadow for 3D */
  .body::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 35%;
    background: linear-gradient(to right, transparent, rgba(0,0,30,0.35));
    border-radius: 0 60px 45px 0;
  }

  @keyframes bodyBob {
    0%,100% { transform: translateX(-50%) translateY(0) scaleX(1); }
    50% { transform: translateX(-50%) translateY(-5px) scaleX(0.98); }
  }

  /* Eyes container */
  .eyes {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    z-index: 5;
    transition: transform 0.3s;
  }

  .eye {
    width: 34px; height: 38px;
    background: white;
    border-radius: 50%;
    position: relative;
    box-shadow: inset 0 3px 6px rgba(0,0,0,0.15), 0 0 0 2px #1a3070;
    overflow: hidden;
    transition: all 0.3s;
  }

  .pupil {
    position: absolute;
    width: 18px; height: 20px;
    background: radial-gradient(circle at 35% 30%, #3a3a3a, #000);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.2s;
  }
  .pupil::after {
    content: '';
    position: absolute;
    top: 3px; left: 4px;
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
  }

  /* Eyelid for expressions */
  .eyelid {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0;
    background: #3a6ad8;
    border-radius: 50% 50% 0 0;
    transition: height 0.3s;
    z-index: 10;
  }

  /* Mouth */
  .mouth-wrap {
    position: absolute;
    bottom: 38px; left: 50%;
    transform: translateX(-50%);
    width: 50px; height: 22px;
    overflow: hidden;
    z-index: 5;
  }
  .mouth {
    position: absolute;
    width: 36px; height: 36px;
    border: 3px solid #1a3070;
    border-radius: 50%;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    transition: all 0.3s;
    background: #1a1050;
  }

  /* Cheeks */
  .cheek {
    position: absolute;
    width: 22px; height: 12px;
    background: radial-gradient(ellipse, rgba(255,100,100,0.5), transparent);
    border-radius: 50%;
    bottom: 68px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .cheek.left { left: 10px; }
  .cheek.right { right: 10px; }

  /* Hands */
  .hands {
    position: absolute;
    bottom: -2px; left: 50%;
    transform: translateX(-50%);
    width: 150px;
    display: flex;
    justify-content: space-between;
    z-index: 3;
  }
  .hand {
    width: 28px; height: 22px;
    background: radial-gradient(ellipse at 50% 30%, #5a90f0, #2a5cc8);
    border-radius: 40% 40% 35% 35%;
    box-shadow: inset -3px -3px 6px rgba(0,0,40,0.4), 0 0 0 2px #1a3070;
    position: relative;
    transition: transform 0.3s;
  }
  .hand::before, .hand::after, .hand .finger3 {
    content: '';
    position: absolute;
    top: -5px;
    width: 7px; height: 9px;
    background: radial-gradient(ellipse, #5a90f0, #2a5cc8);
    border-radius: 50% 50% 40% 40%;
    border: 1.5px solid #1a3070;
  }
  .hand::before { left: 3px; }
  .hand::after { left: 11px; }
  .hand .finger3 { left: 19px; }
  .hand.right { transform: scaleX(-1); }

  /* Feet */
  .feet {
    position: absolute;
    bottom: -16px; left: 50%;
    transform: translateX(-50%);
    width: 130px;
    display: flex;
    justify-content: space-between;
    z-index: 2;
  }
  .foot {
    width: 40px; height: 18px;
    background: radial-gradient(ellipse at 40% 30%, #4a7de8, #1a3a8a);
    border-radius: 50%;
    box-shadow: 0 0 0 2px #1a3070, 0 4px 8px rgba(0,0,0,0.4);
    transition: transform 0.3s;
  }

  /* Shadow on shelf */
  .shadow {
    position: absolute;
    bottom: -22px; left: 50%;
    transform: translateX(-50%);
    width: 100px; height: 16px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.5), transparent);
    border-radius: 50%;
    z-index: 0;
  }

  /* ===== STATES ===== */

  /* HAPPY */
  .bloo-wrap.happy .body { background: radial-gradient(ellipse at 35% 30%, #8dc8ff, #5a9aff 35%, #3a7aee 65%, #2055c8 100%); }
  .bloo-wrap.happy .cheek { opacity: 1; }
  .bloo-wrap.happy .mouth { bottom: -3px; border-color: #ff6090; background: #ffaacc; width: 30px; height: 30px; }
  .bloo-wrap.happy .bloo-3d { animation: happyBounce 0.5s ease-out; }
  @keyframes happyBounce {
    0%,100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-15px) rotate(-3deg); }
    75% { transform: translateY(-8px) rotate(3deg); }
  }
  .bloo-wrap.happy .hand { transform: translateY(-8px) rotate(-20deg); }
  .bloo-wrap.happy .hand.right { transform: translateY(-8px) rotate(20deg) scaleX(-1); }

  /* SAD */
  .bloo-wrap.sad .body { background: radial-gradient(ellipse at 35% 30%, #5888c8, #3a5ab8 35%, #2040a0 65%, #101868 100%); }
  .bloo-wrap.sad .eyelid { height: 40%; }
  .bloo-wrap.sad .mouth { border-radius: 50%; bottom: 8px; transform: translateX(-50%) scaleY(-1); width: 24px; height: 24px; }
  .bloo-wrap.sad .bloo-3d { animation: sadShake 0.4s ease-out; }
  @keyframes sadShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-5px) rotate(-2deg); }
    75% { transform: translateX(5px) rotate(2deg); }
  }
  .bloo-wrap.sad .foot { transform: rotate(5deg); }

  /* SLEEPING */
  .bloo-wrap.sleeping .eyelid { height: 90%; }
  .bloo-wrap.sleeping .bloo-3d { animation: sleepBob 2s ease-in-out infinite; }
  @keyframes sleepBob {
    0%,100% { transform: rotate(-2deg) translateY(0); }
    50% { transform: rotate(2deg) translateY(3px); }
  }

  /* ANGRY */
  .bloo-wrap.angry .body { background: radial-gradient(ellipse at 35% 30%, #e87070, #c84040 35%, #a02020 65%, #700808 100%); }
  .bloo-wrap.angry .bloo-3d { animation: angryShake 0.3s ease-out 3; }
  @keyframes angryShake {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-4deg); }
    75% { transform: rotate(4deg); }
  }
  .bloo-wrap.angry .eyelid { height: 20%; background: #a02020; transform: skewX(-10deg); }
  .bloo-wrap.angry .eye.right .eyelid { transform: skewX(10deg); }
  .bloo-wrap.angry .mouth { border-radius: 50%; bottom: 8px; transform: translateX(-50%) scaleY(-1); width: 28px; height: 28px; background: #400000; }

  /* CURIOUS - looking around */
  .bloo-wrap.curious .bloo-3d { animation: lookAround 0.6s ease-in-out; }
  @keyframes lookAround {
    0%,100% { transform: rotate(0); }
    30% { transform: rotate(8deg); }
    70% { transform: rotate(-5deg); }
  }

  /* EXCITED */
  .bloo-wrap.excited .bloo-3d { animation: excited 0.4s ease-out 4; }
  @keyframes excited {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-12px) scale(1.05); }
  }
  .bloo-wrap.excited .cheek { opacity: 1; }

  /* CONFUSED */
  .bloo-wrap.confused .bloo-3d { animation: confused 0.5s ease-out; }
  @keyframes confused {
    0%,100% { transform: rotate(0); }
    50% { transform: rotate(-12deg); }
  }

  /* Tap ripple */
  .ripple {
    position: fixed;
    border-radius: 50%;
    width: 20px; height: 20px;
    margin-left: -10px; margin-top: -10px;
    background: rgba(120,180,255,0.5);
    animation: rippleOut 0.5s ease-out forwards;
    pointer-events: none; z-index: 100;
  }
  @keyframes rippleOut {
    to { transform: scale(6); opacity: 0; }
  }

  /* Particles (hearts, stars, zzz) */
  .particle {
    position: fixed;
    font-size: 20px;
    pointer-events: none;
    z-index: 50;
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    to { transform: translateY(-120px) scale(0); opacity: 0; }
  }

  /* Bottom hint */
  .hint {
    position: fixed;
    bottom: 14px; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    letter-spacing: 1px;
    z-index: 20;
    pointer-events: none;
  }

  /* Tap counter badge */
  .mood-label {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 20;
    pointer-events: none;
    transition: opacity 0.4s;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="shelf"></div>
<div class="ground-glow"></div>

<div class="mood-label" id="moodLabel">· · ·</div>

<div class="scene">
  <div class="bubble" id="bubble">Hello!</div>

  <div class="bloo-wrap" id="bloo">
    <div class="shadow"></div>
    <div class="bloo-3d">
      <div class="body"></div>
      <div class="eyes">
        <div class="eye left">
          <div class="eyelid"></div>
          <div class="pupil"></div>
        </div>
        <div class="eye right">
          <div class="eyelid"></div>
          <div class="pupil"></div>
        </div>
      </div>
      <div class="cheek left"></div>
      <div class="cheek right"></div>
      <div class="mouth-wrap"><div class="mouth"></div></div>
      <div class="hands">
        <div class="hand left"><span class="finger3"></span></div>
        <div class="hand right"><span class="finger3"></span></div>
      </div>
      <div class="feet">
        <div class="foot left"></div>
        <div class="foot right"></div>
      </div>
    </div>
  </div>
</div>

<div class="hint">tap · drag · touch bloo</div>

<script>
// --- Stars ---
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*65}%;--d:${1.5+Math.random()*3}s;opacity:${Math.random()*0.7+0.1}`;
  starsEl.appendChild(s);
}

// --- State ---
const bloo = document.getElementById('bloo');
const bubble = document.getElementById('bubble');
const moodLabel = document.getElementById('moodLabel');
const pupils = document.querySelectorAll('.pupil');

let currentMood = 'idle';
let bubbleTimer = null;
let moodTimer = null;
let lastTapZone = null;
let petStreak = 0;
let tapCount = 0;

// --- Mood system ---
const moods = {
  happy:   { label: 'happy 😊',    bubble: ['Yay! 🎉', 'Wheee! ✨', 'I love this! 💙', 'Hehe~'] },
  sad:     { label: 'sad 😢',      bubble: ['Ouch... 😢', 'That hurt!', 'Please be gentle!', 'Why... 💔'] },
  sleeping:{ label: 'sleeping 😴', bubble: ['Zzz... 💤', '...mmmph...', 'Zzz~'] },
  angry:   { label: 'angry 😠',    bubble: ['Hey!! 😤', 'STOP IT!', 'I said NO! 🔥', 'Grrrr!'] },
  curious: { label: 'curious 👀',  bubble: ['Hmm...?', 'What was that?', 'Over there!', '👀'] },
  excited: { label: 'excited 🤩',  bubble: ['OMG!! 🤩', 'WAHOO! 🎊', 'YES!! 💥', 'WOW WOW WOW!'] },
  confused:{ label: 'confused 🤔', bubble: ['Huh...?', 'I don\'t get it', 'What? 😵', '...wait'] },
};

function setMood(mood, duration = 2500) {
  // Remove all mood classes
  Object.keys(moods).forEach(m => bloo.classList.remove(m));
  bloo.classList.add(mood);
  currentMood = mood;

  const data = moods[mood];
  const msg = data.bubble[Math.floor(Math.random()*data.bubble.length)];
  showBubble(msg);
  moodLabel.textContent = data.label;
  moodLabel.style.opacity = '0.7';

  clearTimeout(moodTimer);
  if (mood !== 'sleeping') {
    moodTimer = setTimeout(() => {
      Object.keys(moods).forEach(m => bloo.classList.remove(m));
      currentMood = 'idle';
      moodLabel.style.opacity = '0.3';
      moodLabel.textContent = '· · ·';
    }, duration);
  }
}

function showBubble(text) {
  bubble.textContent = text;
  bubble.classList.add('show');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 2200);
}

// --- Particles ---
function spawnParticle(x, y, emoji) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = emoji;
  p.style.cssText = `left:${x}px;top:${y}px;transform:translateX(${(Math.random()-0.5)*40}px)`;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1200);
}

// --- Ripple ---
function spawnRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText = `left:${x}px;top:${y}px`;
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 500);
}

// --- Eye tracking ---
document.addEventListener('pointermove', (e) => {
  const blooBounds = bloo.getBoundingClientRect();
  const cx = blooBounds.left + blooBounds.width / 2;
  const cy = blooBounds.top + blooBounds.height / 2;
  const dx = (e.clientX - cx) / window.innerWidth * 8;
  const dy = (e.clientY - cy) / window.innerHeight * 8;
  pupils.forEach(p => {
    p.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  });
  if (currentMood === 'idle') {
    // curious look
    clearTimeout(moodTimer);
    moodTimer = setTimeout(() => {}, 0);
  }
});

// --- Tap detection ---
function getZone(x, y) {
  const rect = bloo.getBoundingClientRect();
  // Relative to bloo center
  const rx = (x - rect.left) / rect.width;
  const ry = (y - rect.top) / rect.height;
  const inside = rx > 0 && rx < 1 && ry > 0.1 && ry < 1;
  if (!inside) return 'outside';
  if (ry < 0.5) return 'head';   // top half = head
  return 'body';
}

let lastTap = 0;
let tapInterval = null;
let rapidTaps = 0;

bloo.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const x = e.clientX, y = e.clientY;
  spawnRipple(x, y);

  const zone = getZone(x, y);
  const now = Date.now();
  const isRapid = now - lastTap < 400;
  lastTap = now;
  if (isRapid) rapidTaps++; else rapidTaps = 0;

  if (rapidTaps >= 3) {
    // Rapid tapping = excited
    setMood('excited', 3000);
    spawnParticle(x, y-20, '🎉');
    spawnParticle(x+20, y-30, '✨');
    spawnParticle(x-20, y-40, '💫');
    rapidTaps = 0;
    return;
  }

  if (zone === 'head') {
    // Tap on face = sad/angry based on mood
    if (currentMood === 'happy') {
      setMood('angry', 2000);
      spawnParticle(x, y-10, '💢');
    } else if (currentMood === 'angry') {
      setMood('sad', 2000);
      spawnParticle(x, y-10, '😢');
    } else {
      setMood('sad', 2000);
      spawnParticle(x, y-10, '💔');
    }
  } else if (zone === 'body') {
    // Belly tap = tickle / happy
    petStreak++;
    if (petStreak >= 3) {
      setMood('excited', 2500);
      spawnParticle(x, y-20, '💙');
      spawnParticle(x+15, y-35, '✨');
    } else {
      setMood('happy', 2000);
      spawnParticle(x, y-15, '💙');
    }
  } else {
    // Tap elsewhere = curious
    petStreak = 0;
    setMood('curious', 2000);
    // Eyes track to tap point
    const blooBounds = bloo.getBoundingClientRect();
    const cx = blooBounds.left + blooBounds.width / 2;
    const cy = blooBounds.top + blooBounds.height / 2;
    const dx = (x - cx) / 30;
    const dy = (y - cy) / 40;
    pupils.forEach(p => {
      p.style.transform = `translate(calc(-50% + ${Math.max(-6,Math.min(6,dx))}px), calc(-50% + ${Math.max(-5,Math.min(5,dy))}px))`;
    });
  }
});

// Long press = sleeping
let longPressTimer = null;
bloo.addEventListener('pointerdown', () => {
  longPressTimer = setTimeout(() => {
    setMood('sleeping', 99999);
    spawnParticle(
      bloo.getBoundingClientRect().left + 80,
      bloo.getBoundingClientRect().top - 10, '💤');
  }, 1000);
});
bloo.addEventListener('pointerup', () => clearTimeout(longPressTimer));
bloo.addEventListener('pointerleave', () => clearTimeout(longPressTimer));

// Tap outside = confused (after a delay of no interaction)
let idleTimer = null;
document.addEventListener('pointerdown', (e) => {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (currentMood === 'idle') {
      setMood('confused', 2000);
      spawnParticle(
        bloo.getBoundingClientRect().left + 70,
        bloo.getBoundingClientRect().top + 20, '🤔');
    }
  }, 8000);
});

// Wake from sleep on tap
document.addEventListener('pointerdown', () => {
  if (currentMood === 'sleeping') {
    setMood('confused', 2000);
  }
});

// Initial greeting
setTimeout(() => {
  showBubble('Hi there! 👋');
  moodLabel.textContent = 'say hello!';
  moodLabel.style.opacity = '0.5';
}, 800);

// Telegram setup
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#060d1f');
  tg.setBackgroundColor('#060d1f');
}
</script>
</body>
</html>
